<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICI - Carregando</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #0a0f14;
    color: #e6f1f5;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(600px 400px at 20% 15%, rgba(0,209,255,0.15), transparent 60%),
      radial-gradient(500px 350px at 80% 85%, rgba(0,209,255,0.10), transparent 60%);
    filter: blur(20px);
    z-index: 0;
    pointer-events: none;
  }
.card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px;
    padding: 36px 28px 24px;
    backdrop-filter: blur(20px) saturate(140%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    animation: rise 0.7s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.logo {
    font-size: 64px;
    font-weight: 800;
    color: #00d1ff;
    text-align: center;
    text-shadow: 0 0 20px rgba(0,209,255,0.65), 0 0 40px rgba(0,209,255,0.35);
  }
.subtitle { text-align: center; margin-top: 8px; color: #9fb3c0; font-size: 15px; }
.spinner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin: 32px 0 20px;
  }
.spinner {
    width: 64px;
    height: 64px;
    border: 3px solid rgba(0,209,255,0.15);
    border-top-color: #00d1ff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    box-shadow: 0 0 24px rgba(0,209,255,0.18) inset;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
.preparing { font-weight: 600; font-size: 17px; }
.info {
    margin-top: 24px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
  }
.info.row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
.info.label { color: #9fb3c0; }
.photos { margin-top: 22px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.photo-box {
    aspect-ratio: 1 / 1;
    border: 2px dashed rgba(255,255,255,0.14);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
.photo-box img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }
.photo-box img[src] + span { display: none; }
  footer { text-align: center; margin-top: 24px; font-size: 12px; color: #6b7f8c; }
</style>
</head>
<body>
  <main class="card">
    <header>
      <div class="logo">ICI</div>
      <p class="subtitle">Olá</p>
    </header>

    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="preparing">Faça o Pagamento embaixo QR Código para liberar!</div>
    </div>

    <section class="info">
      <div class="row">
        <span class="label">Número do cliente:</span>
        <span id="numero">[INSIRA O NÚMERO]</span>
      </div>
      <div class="row">
        <span class="label">Nome completo:</span>
        <span id="nome">[INSIRA O NOME COMPLETO]</span>
      </div>
    </section>

    <section class="photos">
      <div class="grid">
        <div class="photo-box">
          <img src="pagamento.png" alt="Cliente">
          <span>+</span>
        </div>
      </div>
    </section>

    <footer>ICI © 2026</footer>
  </main>

<script>
  const CLIENT_NUMBER = "0000002";
  const CLIENT_NAME = "Everton pazini";

  // AQUI você coloca o link de destino
  const REDIRECT_URL = "https://sounds-platform-avon-ensemble.trycloudflare.com/ici/storage/iciflix/";

  document.getElementById('numero').textContent = CLIENT_NUMBER;
  document.getElementById('nome').textContent = CLIENT_NAME;

  // espera 10 segundos com o loading girando
  setTimeout(() => {
    window.location.href = REDIRECT_URL;
  }, 10000);
</script>
</body>
</html>
